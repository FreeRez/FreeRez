<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			try {
				const t = JSON.parse(localStorage.getItem('fr-theme') || '{}');
				const c = document.documentElement.classList;
				if (t.mode === 'dark') c.add('dark');
				if (t.collapsed) c.add('sidebar-collapsed');
				if (t.density === 'compact') c.add('density-compact');
				if (t.density === 'spacious') c.add('density-spacious');
			} catch {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
